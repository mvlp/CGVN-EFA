name: Renderiza Rmd para md

on:
  push:
    paths:
      - README.Rmd # O robô só trabalha quando você altera este arquivo

jobs:
  renderizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Instalar o R
        uses: r-lib/actions/setup-r@v2

      - name: Instalar o pacote rmarkdown
        run: Rscript -e 'install.packages("rmarkdown")'

      - name: Executar o código e gerar a matriz
        run: Rscript -e 'rmarkdown::render("README.Rmd", output_format = "github_document")'

      - name: Salvar (commit) o README.md atualizado no GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add README.md
          git commit -m "Atualizando matriz de correlação" || echo "Sem mudanças"
          git push origin || echo "Sem mudanças"
